# Logstash pipeline for mds_elk stack.
# Ingests ModSecurity JSON audit logs from Filebeat, maps them to the
# honeypot v1.1 event schema, and enriches with GeoIP2 and MITRE ATT&CK tags.

input {
  beats {
    port => 5044
  }
}

filter {
  # Each line in modsec_audit.log is a complete JSON object when
  # SecAuditLogFormat JSON is set. Parse it out of the message field.
  json {
    source => "message"
    target => "modsec"
    remove_field => ["message"]
  }

  # Routing: determine if this is an attack event or a rotation event
  if [modsec][transaction] {
    # It's a ModSecurity audit log
    mutate {
      add_field => {
        "event_type"                    => "attack"
        "[event_envelope][version]"     => "1.1"
        "[event_envelope][node_id]"     => "${HONEYPOT_NODE_ID:honeypot-node-local}"
        "[event_envelope][honeypot_ip]" => "${HONEYPOT_IP:0.0.0.0}"
        "[event_envelope][aws_region]"  => "${AWS_REGION:local}"
      }
    }

    mutate {
      copy => { "[modsec][transaction][time]" => "[event_envelope][timestamp]" }
    }

    # persona fields also from env vars so the same pipeline works across containers
    mutate {
      add_field => {
        "[persona_context][name]"    => "${HONEYPOT_PERSONA:unknown}"
        "[persona_context][profile]" => "${HONEYPOT_PROFILE:general}"
      }
    }

  # GeoIP2 city enrichment using the bundled GeoLite2-City db.
  # ASN fields (geoip2.asn + geoip2.isp) need GeoLite2-ASN.mmdb mounted in, coming next.
  geoip {
    source => "[modsec][transaction][remote_address]"
    target => "[geoip2]"
    fields => ["country_code2", "city_name", "latitude", "longitude"]
  }
  mutate {
    rename => {
      "[geoip2][country_code2]" => "[geoip2][country]"
      "[geoip2][city_name]"     => "[geoip2][city]"
    }
  }

  # --- ASN/ISP enrichment start ---
  # ASN/ISP enrichment using the GeoLite2-ASN database.
  # Check if the database was downloaded during the Docker build.
  ruby {
    code => '
      if File.exist?("/usr/share/logstash/GeoLite2-ASN.mmdb")
        event.set("[@metadata][asn_db_available]", true)
      end
    '
  }

  if [@metadata][asn_db_available] {
    geoip {
      source   => "[modsec][transaction][remote_address]"
      target   => "[geoip2]"
      database => "/usr/share/logstash/GeoLite2-ASN.mmdb"
      fields   => ["autonomous_system_number", "autonomous_system_organization"]
      tag_on_failure => ["_asn_lookup_failure"]
    }
    mutate {
      rename => {
        "[geoip2][autonomous_system_number]"       => "[geoip2][asn]"
        "[geoip2][autonomous_system_organization]" => "[geoip2][isp]"
      }
    }
  }
  # --- ASN/ISP enrichment end ---

  # map modsec transaction fields to v1.1 schema
  mutate {
    copy => {
      "[modsec][transaction][transaction_id]" => "[transaction][transaction_id]"
      "[modsec][transaction][time]"           => "[transaction][time]"
      "[modsec][transaction][remote_address]" => "[transaction][remote_address]"
      "[modsec][transaction][remote_port]"    => "[transaction][remote_port]"
      "[modsec][transaction][local_address]"  => "[transaction][local_address]"
      "[modsec][transaction][local_port]"     => "[transaction][local_port]"
      "[modsec][request][request_line]"       => "[request][request_line]"
      "[modsec][request][headers]"            => "[request][headers]"
      "[modsec][response][protocol]"          => "[response][protocol]"
      "[modsec][response][status]"            => "[response][status]"
      "[modsec][response][headers]"           => "[response][headers]"
    }
  }

  # attack type and MITRE technique IDs mapped from the CRS rule file name
  ruby {
    code => '
      messages = event.get("[modsec][audit_data][messages]")
      if messages && messages.is_a?(Array) && messages.length > 0
        severity = "UNKNOWN"
        rule_id = ""
        attack_type = "UNKNOWN"
        cve = nil
        mitre = []

        messages.each do |msg|
          if msg =~ /\[severity "([^"]+)"\]/
            severity = $1.to_s
          end
          if msg =~ /\[id "([^"]+)"\]/ && rule_id == ""
            rule_id = $1.to_s
          end
          if msg =~ /\[tag "(CVE-[^"]+)"\]/ && cve.nil?
            cve = $1.to_s
          end
          if msg =~ /\[file "([^"]+)"\]/
            rule_file = $1.to_s
            if rule_file.include?("XSS")
              attack_type = "XSS"
              mitre = ["T1059.007"]
            elsif rule_file.include?("SQL")
              attack_type = "SQLi"
              mitre = ["T1190"]
            elsif rule_file.include?("LFI") || rule_file.include?("RFI")
              attack_type = "LFI/RFI"
              mitre = ["T1083"]
            elsif rule_file.include?("-RCE") || rule_file.include?("COMMAND")
              attack_type = "RCE"
              mitre = ["T1059"]
            elsif rule_file.include?("SCANNER")
              attack_type = "Scanner"
              mitre = ["T1595"]
            elsif rule_file.include?("TRAVERSAL")
              attack_type = "Path Traversal"
              mitre = ["T1083", "T1190"]
            end
          end
          # Only break early if we have everything, or we might miss a CVE tag in a later message!
        end

        event.set("[attack_classification][severity]", severity)
        event.set("[attack_classification][honeytrap_rule_id]", rule_id)
        
        # Check if the triggered rule is a custom honeytrap rule.
        # This matches the current 6-digit PoC rules (999xxx) AND the future GSoC 7-digit plugin range (9500000-9999999).
        rule_id_int = rule_id.to_i
        honeytrap_triggered = (rule_id_int >= 999000 && rule_id_int <= 999999) || (rule_id_int >= 9500000 && rule_id_int <= 9999999)
        event.set("[attack_classification][honeytrap_triggered]", honeytrap_triggered)
        
        event.set("[attack_classification][type]", attack_type)
        if cve
          event.set("[attack_classification][cve_triggered]", cve)
        end
        event.set("mitre_attack", mitre)
      end

      # The WAF injects Admin=0 as a canary cookie in deceptive responses.
      # If it appears in the Set-Cookie header, a honeytoken was triggered.
      resp_headers = event.get("[modsec][response][headers]") || {}
      cookie = resp_headers["Set-Cookie"] || ""
      event.set("[response][honeytoken_triggered]", cookie.include?("Admin="))
    '
  }

  } else if [modsec][event_type] == "persona_rotation" {
    # It's a persona rotation event pre-formatted by the watchdog script
    mutate {
      rename => {
        "[modsec][event_type]" => "event_type"
        "[modsec][event_envelope]" => "event_envelope"
        "[modsec][persona_rotation]" => "persona_rotation"
      }
    }
  }

  mutate {
    add_field => { "[feed_metadata][export_timestamp]" => "%{@timestamp}" }
    remove_field => ["modsec"]
  }
}

output {
  elasticsearch {
    hosts => "elasticsearch:9200"
    manage_template => false
    index => "honeypot-attacks-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
