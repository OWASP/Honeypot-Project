version: "3.8"

services:
  misp_push:
    networks:
      - elastic
    volumes:
      - ./misp-push:/app
    env_file:
      - ./misp-push/env
    build: ./misp-push/
    command: /app/start.sh
    links:
      - elasticsearch
    depends_on:
      - elasticsearch
    restart: always

  elasticsearch:
    image: elasticsearch:7.17.10
    ports:
    - "9200:9200"
    - "9300:9300"
    environment:
      - node.name=elasticsearch
      - cluster.name=es-docker-cluster
      - discovery.type=single-node
      - discovery.seed_hosts=elasticsearch
      #- logger.transport.level=trace
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false

    networks:
      - elastic
  kibana:
    image: kibana:7.17.10
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    links:
      - elasticsearch
    depends_on:
      - elasticsearch

    networks:
      - elastic
  logstash:
    links:
      - elasticsearch
    ports:
      - "5044:5044"
    build:
      context: ./logstash
      dockerfile: Dockerfile
    depends_on:
    - elasticsearch
    environment:
    - PIPENV_VENV_IN_PROJECT=true
    command: logstash

    networks:
      - elastic

networks:
  elastic:
    driver: bridge