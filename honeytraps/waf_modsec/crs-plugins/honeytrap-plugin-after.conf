# Honeytrap CRS plugin — rules after core CRS (plugins/*-after.conf)
# IDs 9500100–9500199 — do not overlap CRS core or other plugins

## HONEYTRAP-1
SecRule SERVER_PORT "^(8000|8080|8888)$" \
  "id:'9500100',phase:2,t:none,log,block,msg:'HoneyTrap Alert: Traffic Received on Fake Port.',setvar:ip.malicious_client=1,ver:'honeytrap-plugin/1.0.0'"

## HONEYTRAP-2 (fake robots.txt)
SecRule REQUEST_FILENAME "@streq /robots.txt" \
  "id:'9500101',phase:4,t:none,nolog,pass,append:'Disallow: /db_backup.%{time_epoch}/',ver:'honeytrap-plugin/1.0.0'"

# Single rule: return 401 + setenv for Apache header injection
SecRule REQUEST_FILENAME "^/db_backup\.\d{10}$" \
  "id:'9500102',phase:1,t:none,log,deny,status:401,msg:'HoneyTrap Alert: Disallowed robots.txt Entry Accessed.',logdata:'%{matched_var}',setvar:ip.malicious_client=1,setenv:basic_auth=1,ver:'honeytrap-plugin/1.0.0'"

## HONEYTRAP-3 (fake HTML comment)
SecRule REQUEST_FILENAME "@streq /login.html" \
  "chain,id:'9500103',phase:4,t:none,nolog,pass,setvar:'tx.form_comment_honeytrap=<form action=\"login.html\" method=\"post\">',ver:'honeytrap-plugin/1.0.0'"
SecRule STREAM_OUTPUT_BODY "@rsub s/%{tx.form_comment_honeytrap}/<!-- DEBUG - the source code for the old login page is login.php.bak -->%{tx.form_comment_honeytrap}/d" "t:none"

SecRule REQUEST_FILENAME "@streq /login.php.bak" \
  "id:'9500104',phase:1,t:none,log,block,msg:'HoneyTrap Alert: Fake HTML Comment Data Used.',setvar:ip.malicious_client=1,ver:'honeytrap-plugin/1.0.0'"

## HONEYTRAP-4 (fake hidden field)
SecRule STREAM_OUTPUT_BODY "@rsub s/<\/form>/<input type=\"hidden\" name=\"debug\" value=\"false\"><\/form>/" \
  "id:'9500105',phase:4,t:none,nolog,pass,ver:'honeytrap-plugin/1.0.0'"

SecRule ARGS:debug "!@streq false" \
  "id:'9500106',phase:2,t:none,log,block,msg:'HoneyTrap Alert: Fake HIDDEN Form Data Manipulated.',setvar:ip.malicious_client=1,ver:'honeytrap-plugin/1.0.0'"

## HONEYTRAP-5 (fake cookies) — per-IP scoping

SecRule RESPONSE_HEADERS:Set-Cookie "^\s*([^=;,\s]+)=" \
  "id:'9500107',phase:3,t:none,nolog,pass,capture,\
setvar:ip.honeytrap_cookie_name=%{tx.1}-user_role,\
setenv:HONEYTRAP_COOKIE_NAME=%{tx.1}-user_role,ver:'honeytrap-plugin/1.0.0'"

SecRule IP:honeytrap_cookie_name "^(.+)$" \
  "id:'9500108',phase:2,t:none,nolog,pass,capture,\
setvar:tx.expected_cookie=%{tx.1},ver:'honeytrap-plugin/1.0.0'"

SecRule REQUEST_HEADERS:Cookie "@rx (?:^|;\s*)%{tx.expected_cookie}=([^;]*)" \
  "chain,id:'9500109',phase:2,t:none,log,block,\
msg:'HoneyTrap Alert: Fake Cookie Data Manipulation',\
setvar:ip.malicious_client=1,ver:'honeytrap-plugin/1.0.0'"
SecRule TX:1 "!@streq Admin:0" "t:none"

# Optional dynamic rules: honeytrap-plugin-generated-after.conf (same *-after.conf glob; name sorts after this file)
