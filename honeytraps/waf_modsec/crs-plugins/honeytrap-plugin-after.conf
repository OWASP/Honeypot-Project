
# Honeytrap CRS Plugin - Main Detection Rules

#
# Loaded after CRS core rules (phase 5 in plugin architecture)
# Rule ID range: 9500100-9500199 (reserved for static rules)
#
# AI-generated rules use IDs 9500200+ in:
#   honeytrap-plugin-generated-after.conf
#


## HONEYTRAP-1: Fake Port Detection
SecRule SERVER_PORT "@rx ^(8000|8080|8888)$" \
 "id:'9500100',\
  phase:2,\
  t:none,\
  log,\
  block,\
  msg:'HoneyTrap Alert: Traffic Received on Fake Port',\
  logdata:'Port: %{MATCHED_VAR}',\
  setvar:ip.malicious_client=1,\
  ver:'honeytrap-plugin/1.0.0'"

## HONEYTRAP-2: Fake robots.txt Entry Injection
SecRule REQUEST_FILENAME "@streq /robots.txt" \
 "id:'9500101',\
  phase:4,\
  t:none,\
  nolog,\
  pass,\
  append:'Disallow: /db_backup/',\
  ver:'honeytrap-plugin/1.0.0'"

## HONEYTRAP-2b: Fake robots.txt Entry Access Detection
SecRule REQUEST_FILENAME "@rx ^/db_backup(?:/.*)?$" \
 "id:'9500102',\
  phase:2,\
  t:none,\
  log,\
  deny,\
  status:401,\
  msg:'HoneyTrap Alert: Disallowed robots.txt Entry Accessed',\
  logdata:'Path: %{MATCHED_VAR}',\
  setvar:ip.malicious_client=1,\
  setenv:basic_auth=1,\
  ver:'honeytrap-plugin/1.0.0'"

## HONEYTRAP-3: Fake HTML Comment Injection
SecRule REQUEST_FILENAME "@streq /login.html" \
 "id:'9500103',\
  phase:4,\
  t:none,\
  nolog,\
  pass,\
  ver:'honeytrap-plugin/1.0.0'"

SecRule STREAM_OUTPUT_BODY "@rsub s|<form action=\"login\.html\" method=\"post\">|<!-- DEBUG - the source code for the old login page is login.php.bak -->\n<form action=\"login.html\" method=\"post\">|" \
 "id:'9500111',\
  phase:4,\
  t:none,\
  nolog,\
  pass,\
  ver:'honeytrap-plugin/1.0.0'"

## HONEYTRAP-3b: Fake HTML Comment Data Access Detection
SecRule REQUEST_FILENAME "@streq /login.php.bak" \
 "id:'9500104',\
  phase:1,\
  t:none,\
  log,\
  block,\
  msg:'HoneyTrap Alert: Fake HTML Comment Data Used',\
  setvar:ip.malicious_client=1,\
  ver:'honeytrap-plugin/1.0.0'"

## HONEYTRAP-4: Fake Hidden Field Injection
SecRule STREAM_OUTPUT_BODY "@rsub s|</form>|<input type=\"hidden\" name=\"debug\" value=\"false\"></form>|" \
 "id:'9500105',\
  phase:4,\
  t:none,\
  nolog,\
  pass,\
  ver:'honeytrap-plugin/1.0.0'"

## HONEYTRAP-4b: Fake Hidden Field Manipulation Detection
SecRule ARGS:debug "!@streq false" \
 "id:'9500106',\
  phase:2,\
  t:none,\
  log,\
  block,\
  msg:'HoneyTrap Alert: Fake Hidden Form Field Manipulated',\
  logdata:'Value: %{MATCHED_VAR}',\
  setvar:ip.malicious_client=1,\
  ver:'honeytrap-plugin/1.0.0'"

## HONEYTRAP-5: Fake Cookie Injection (Per-IP Scoping)

# Step 1: Capture existing cookie name and create honeytrap variant
SecRule RESPONSE_HEADERS:Set-Cookie "@rx ^\s*([^=;,\s]+)=" \
 "id:'9500107',\
  phase:3,\
  t:none,\
  nolog,\
  pass,\
  capture,\
  setvar:ip.honeytrap_cookie_name=%{TX.1}-user_role,\
  setenv:HONEYTRAP_COOKIE_NAME=%{TX.1}-user_role,\
  ver:'honeytrap-plugin/1.0.0'"

# Step 2: Retrieve expected cookie name for this IP
SecRule IP:honeytrap_cookie_name "@rx ^(.+)$" \
 "id:'9500108',\
  phase:2,\
  t:none,\
  nolog,\
  pass,\
  capture,\
  setvar:tx.expected_cookie=%{TX.1},\
  ver:'honeytrap-plugin/1.0.0'"

# Step 3: Detect cookie manipulation (value != "Admin:0")
SecRule REQUEST_HEADERS:Cookie "@contains %{tx.expected_cookie}" \
 "chain,\
  id:'9500109',\
  phase:2,\
  t:none,\
  log,\
  block,\
  msg:'HoneyTrap Alert: Fake Cookie Data Manipulation',\
  setvar:ip.malicious_client=1,\
  ver:'honeytrap-plugin/1.0.0'"
    SecRule REQUEST_HEADERS:Cookie "@rx %{tx.expected_cookie}=([^;]+)" \
     "chain,\
      capture,\
      t:none"
        SecRule TX:1 "!@streq Admin:0" \
         "t:none,\
          logdata:'Cookie: %{tx.expected_cookie}=%{TX.1}'"


