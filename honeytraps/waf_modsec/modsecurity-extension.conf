
SecAuditLogFormat JSON
SecContentInjection On
SecStreamOutBodyInspection On

## HONEYTRAP-1
SecRule SERVER_PORT "^(8000|8080|8888)$" \
  "id:'999004',phase:2,t:none,log,block,msg:'HoneyTrap Alert: Traffic Received on Fake Port.',setvar:ip.malicious_client=1"

## HONEYTRAP-2 (fake robots.txt)
SecRule REQUEST_FILENAME "@streq /robots.txt" \
  "id:'999005',phase:4,t:none,nolog,pass,append:'Disallow: /db_backup.%{time_epoch}/'"

SecRule REQUEST_FILENAME "^/db_backup\.\d{10}$" \
  "id:'999006',phase:1,t:none,log,block,msg:'HoneyTrap Alert: Disallowed robots.txt Entry Accessed.',logdata:'%{matched_var}',setvar:ip.malicious_client=1"

# Fake auth challenge trigger (Apache will add WWW-Authenticate header via env var)
SecRule REQUEST_FILENAME "^/db_backup\.\d{10}$" \
  "id:'999011',phase:3,t:none,log,deny,status:401,msg:'HoneyTrapAlert:Disallowed robots.txt Entry Accessed.',logdata:'%{matched_var}',setvar:ip.malicious_client=1,setenv:basic_auth=1"

## HONEYTRAP-3 (fake HTML comment)
SecRule REQUEST_FILENAME "@streq /login.html" \
  "chain,id:'999007',phase:4,t:none,nolog,pass,setvar:'tx.form_comment_honeytrap=<form action=\"login.html\" method=\"post\">'"
SecRule STREAM_OUTPUT_BODY "@rsub s/%{tx.form_comment_honeytrap}/<!-- DEBUG - the source code for the old login page is login.php.bak -->%{tx.form_comment_honeytrap}/d" "t:none"

SecRule REQUEST_FILENAME "@streq /login.php.bak" \
  "id:'999008',phase:1,t:none,log,block,msg:'HoneyTrap Alert: Fake HTML Comment Data Used.',setvar:ip.malicious_client=1"

## HONEYTRAP-4 (fake hidden field)
SecRule STREAM_OUTPUT_BODY "@rsub s/<\/form>/<input type=\"hidden\" name=\"debug\" value=\"false\"><\/form>/" \
  "id:'999009',phase:4,t:none,nolog,pass"

SecRule ARGS:debug "!@streq false" \
  "id:'999010',phase:2,t:none,log,block,msg:'HoneyTrap Alert: Fake HIDDEN Form Data Manipulated.',setvar:ip.malicious_client=1"

## HONEYTRAP-5 (fake cookies) — FIXED alignment
# Capture a cookie name from response, derive bait cookie name, store it in:
# - global.honeytrap_cookie_name (ModSecurity)
# - HONEYTRAP_COOKIE_NAME env var (Apache Header directive will use this)
SecRule RESPONSE_HEADERS:Set-Cookie "^(.*?)=" \
  "id:'999013',phase:3,t:none,nolog,pass,capture,\
setvar:global.honeytrap_cookie_name=%{tx.1}-user_role,\
setenv:HONEYTRAP_COOKIE_NAME=%{tx.1}-user_role"

# If attacker sends our bait cookie but changes value, block + mark IP
SecRule REQUEST_HEADERS:Cookie "@contains %{global.honeytrap_cookie_name}" \
  "chain,id:'999014',phase:1,t:none,log,block,msg:'HoneyTrap Alert: Fake Cookie Data Manipulation',setvar:ip.malicious_client=1"
SecRule REQUEST_HEADERS:Cookie "!@contains =Admin:0" "t:none"
