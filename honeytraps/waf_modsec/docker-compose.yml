
services:
  modsec_crs:
    env_file:
      - ./env
    ports:
      - "9091:80"
      - "8000:8000"
      - "8080:8080"
      - "8888:8888"
    environment:
      - PARANOIA=5
      - CRSUPDATE=${CRSUPDATE:-true}
      - CRSVERSION=${CRSVERSION:-latest}
      - CRS_TARBALL_URL=${CRS_TARBALL_URL:?must set CRS_TARBALL_URL}
      - CRS_EXPECTED_SHA256=${CRS_EXPECTED_SHA256:-}
      - LOGSTASH_HOST=${LOGSTASH_HOST:?must set LOGSTASH_HOST}
    volumes:
      - .:/app
    build: ./
    container_name: modsec_app
    # privileged: true  # remove unless you’ve proven it’s required
