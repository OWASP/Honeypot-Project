services:
  modsec_crs:
    env_file:
      - ./env

    ports:
      - "9091:80"
      - "8000:8000"
      - "8080:8080"
      - "8888:8888"

    environment:
      - PARANOIA=5
      - PERSONA=${PERSONA:-generic}
      - CRSUPDATE=${CRSUPDATE:-false}
      - CRSVERSION=${CRSVERSION:-latest}
      - CRS_TARBALL_URL=${CRS_TARBALL_URL:-}
      - CRS_EXPECTED_SHA256=${CRS_EXPECTED_SHA256:-}
      - LOGSTASH_HOST=${LOGSTASH_HOST:?must set LOGSTASH_HOST}
      - SHODAN_API_KEY=${SHODAN_API_KEY:-}
      - SHODAN_POLL_INTERVAL=${SHODAN_POLL_INTERVAL:-300}

    build: ./
    container_name: modsec_app
