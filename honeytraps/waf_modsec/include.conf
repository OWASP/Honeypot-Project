# OWASP CRS 4.x load order with plugin architecture
# See: https://coreruleset.org/docs/concepts/plugin_mechanism/

Include "/etc/modsecurity.d/modsecurity.conf"


Include /etc/modsecurity.d/owasp-crs/crs-setup.conf


IncludeOptional /etc/modsecurity.d/owasp-crs/plugins/*-config.conf

IncludeOptional /etc/modsecurity.d/owasp-crs/plugins/*-before.conf

Include /etc/modsecurity.d/owasp-crs/rules/*.conf


IncludeOptional /etc/modsecurity.d/owasp-crs/plugins/*-after.conf
