SecAuditLogFormat JSON
SecContentInjection On
SecStreamOutBodyInspection On

## DRUPAL PERSONA — Mimics Drupal 7.57 (CVE-2018-7600 Drupalgeddon2)

## HONEYTRAP-DRUPAL-1: /user/login bait
SecRule REQUEST_FILENAME "@streq /user/login" \
  "id:'997001',phase:1,t:none,log,block,\
msg:'Drupal HoneyTrap: /user/login access attempt.',\
logdata:'%{request_headers.user-agent}',\
setvar:ip.malicious_client=1"

## HONEYTRAP-DRUPAL-2: Drupalgeddon2 path bait
SecRule REQUEST_FILENAME "@rx ^/\?q=user/(login|register|password)" \
  "id:'997002',phase:1,t:none,log,block,\
msg:'Drupal HoneyTrap: Drupalgeddon2 path access attempt.',\
setvar:ip.malicious_client=1"

## HONEYTRAP-DRUPAL-3: /admin/config bait
SecRule REQUEST_FILENAME "@beginsWith /admin/" \
  "id:'997003',phase:1,t:none,log,block,\
msg:'Drupal HoneyTrap: Admin path access attempt.',\
setvar:ip.malicious_client=1"

## HONEYTRAP-DRUPAL-4: /.env bait (common misconfiguration scan)
SecRule REQUEST_FILENAME "@streq /.env" \
  "id:'997004',phase:1,t:none,log,block,\
msg:'Drupal HoneyTrap: .env file access attempt.',\
setvar:ip.malicious_client=1"

## HONEYTRAP-DRUPAL-5: /install.php bait
SecRule REQUEST_FILENAME "@streq /install.php" \
  "id:'997005',phase:1,t:none,log,block,\
msg:'Drupal HoneyTrap: install.php access attempt.',\
setvar:ip.malicious_client=1"

## HONEYTRAP-DRUPAL-6: fake hidden form field
SecRule STREAM_OUTPUT_BODY "@rsub s/<\/form>/<input type=\"hidden\" name=\"drupal_debug\" value=\"false\"><\/form>/" \
  "id:'997006',phase:4,t:none,nolog,pass"

SecRule ARGS:drupal_debug "!@streq false" \
  "id:'997007',phase:2,t:none,log,block,\
msg:'Drupal HoneyTrap: Hidden debug field manipulated.',\
setvar:ip.malicious_client=1"
