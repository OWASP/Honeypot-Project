server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Generator "Drupal 7 (https://www.drupal.org)" always;
    add_header X-Powered-By "PHP/7.4.3" always;

    location = /robots.txt {
        try_files $uri =404;
    }

    location = /user/login {
        try_files /user-login.html =200;
    }

    location = /install.php {
        return 200 '<?php // Drupal installer';
        add_header Content-Type "text/plain" always;
    }

    location = /.env {
        return 403;
    }

    location /admin/ {
        try_files $uri /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
