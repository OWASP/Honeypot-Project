server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Generator "Drupal 7 (https://www.drupal.org)" always;
    add_header X-Powered-By "PHP/7.4.3" always;

    location = /robots.txt {
        try_files $uri =404;
    }

    location = /user/login {
        try_files /user-login.html =200;
    }

    location = /install.php {
        return 200 '<?php // Drupal installer';
        add_header Content-Type "text/plain" always;
    }

    # Common Drupal fingerprint file for version enumeration
    location = /CHANGELOG.txt {
        default_type text/plain;
        return 200 'Drupal 7.92, 2022-03-02 - SA-CORE-2022-003 (security release)
';
    }

    # Common probe: misc/drupal.js header lines (D7 asset path)
    location = /misc/drupal.js {
        default_type application/javascript;
        charset utf-8;
        try_files /misc/drupal.js =404;
    }

    location = /.env {
        return 403;
    }

    location /admin/ {
        try_files $uri /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
