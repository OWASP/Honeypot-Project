server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Powered-By "PHP/7.4.33" always;

    location = /robots.txt {
        try_files $uri =404;
    }

    location = /login/index.php {
        try_files /login/index.html =200;
    }

    location = /index.php {
        try_files /index.html =200;
    }

    location = /lib/javascript.php {
        default_type application/javascript;
        charset utf-8;
        return 200 '// Moodle 3.9';
    }

    location = /config.php {
        return 403;
    }

    location = /install.php {
        return 302 /login/index.php;
    }

    location /admin/ {
        try_files $uri /admin/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
