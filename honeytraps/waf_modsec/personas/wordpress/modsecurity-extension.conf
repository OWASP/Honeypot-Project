SecAuditLogFormat JSON
SecContentInjection On
SecStreamOutBodyInspection On

## WORDPRESS PERSONA — Response headers to mimic WordPress 5.8.1
## These make scanners think this is a real vulnerable WordPress install

SecRule REQUEST_FILENAME "." \
  "id:'998001',phase:3,t:none,nolog,pass,\
setenv:WP_POWERED_BY=PHP/7.4.3"

## HONEYTRAP-WP-1: /wp-login.php bait
SecRule REQUEST_FILENAME "@streq /wp-login.php" \
  "id:'998002',phase:1,t:none,log,block,\
msg:'WordPress HoneyTrap: wp-login.php access attempt.',\
logdata:'%{request_headers.user-agent}',\
setvar:ip.malicious_client=1"

## HONEYTRAP-WP-2: /wp-config.php bait
SecRule REQUEST_FILENAME "@streq /wp-config.php" \
  "id:'998003',phase:1,t:none,log,block,\
msg:'WordPress HoneyTrap: wp-config.php access attempt.',\
setvar:ip.malicious_client=1"

## HONEYTRAP-WP-3: xmlrpc.php bait (common brute force vector)
SecRule REQUEST_FILENAME "@streq /xmlrpc.php" \
  "id:'998004',phase:1,t:none,log,block,\
msg:'WordPress HoneyTrap: xmlrpc.php access attempt.',\
logdata:'%{request_headers.user-agent}',\
setvar:ip.malicious_client=1"

## HONEYTRAP-WP-4: wp-admin bait
SecRule REQUEST_FILENAME "@beginsWith /wp-admin/" \
  "id:'998005',phase:1,t:none,log,block,\
msg:'WordPress HoneyTrap: wp-admin access attempt.',\
setvar:ip.malicious_client=1"

## HONEYTRAP-WP-5: fake robots.txt disallowed entry accessed
SecRule REQUEST_FILENAME "@streq /wp-config.php.bak" \
  "id:'998006',phase:1,t:none,log,block,\
msg:'WordPress HoneyTrap: Backup config file access attempt.',\
setvar:ip.malicious_client=1"

## HONEYTRAP-WP-6: fake hidden debug field in forms
SecRule STREAM_OUTPUT_BODY "@rsub s/<\/form>/<input type=\"hidden\" name=\"wp_debug\" value=\"false\"><\/form>/" \
  "id:'998007',phase:4,t:none,nolog,pass"

SecRule ARGS:wp_debug "!@streq false" \
  "id:'998008',phase:2,t:none,log,block,\
msg:'WordPress HoneyTrap: Hidden debug field manipulated.',\
setvar:ip.malicious_client=1"
