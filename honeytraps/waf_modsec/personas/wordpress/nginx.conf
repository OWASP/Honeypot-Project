server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Powered-By "PHP/7.4.3" always;
    add_header X-Generator "WordPress 5.8.1" always;

    location = /robots.txt {
        try_files $uri =404;
    }

    location = /wp-login.php {
        try_files /wp-login.html =200;
    }

    location = /xmlrpc.php {
        return 200 '<?xml version="1.0"?><methodResponse></methodResponse>';
        add_header Content-Type "text/xml" always;
    }

    location = /wp-config.php {
        return 403;
    }

    # Version surface many scanners/templates match (CVE-era 5.8.x lure)
    location = /readme.html {
        default_type text/html;
        return 200 '<!DOCTYPE html><html><head><title>WordPress</title></head><body><p>Version 5.8.1</p></body></html>';
    }

    # Common probe: greps $wp_version (CVE templates often key on 5.8.x before 5.8.3)
    location = /wp-includes/version.php {
        default_type text/plain;
        charset utf-8;
        try_files /wp-includes/version.php =404;
    }

    location /wp-admin/ {
        try_files $uri /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
