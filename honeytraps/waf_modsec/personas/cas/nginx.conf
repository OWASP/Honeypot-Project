server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Powered-By "Servlet/3.0" always;

    location = /robots.txt {
        try_files $uri =404;
    }

    location = /cas/login {
        try_files /cas/login/index.html =200;
    }

    location = /cas/status {
        default_type text/plain;
        return 200 'UP\n';
    }

    location = /idp/profile/SAML2/Redirect/SSO {
        try_files /saml-redirect-stub.html =200;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
