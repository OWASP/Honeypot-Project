# CHAMELEON-REN: Dynamic Layer 3 Proxy Routing
<VirtualHost *:8080>
    ServerName localhost
    ProxyPreserveHost On
    RewriteEngine On

    # Route to Moodle
    RewriteCond %{HTTP:X-Chameleon-Target} ^moodle$ [NC]
    RewriteRule ^/?(.*)$ http://moodle/$1 [P,L]

    # Route to WordPress
    RewriteCond %{HTTP:X-Chameleon-Target} ^wordpress$ [NC]
    RewriteRule ^/?(.*)$ http://wordpress/$1 [P,L]

    # Route to Gibbon
    RewriteCond %{HTTP:X-Chameleon-Target} ^gibbon$ [NC]
    RewriteRule ^/?(.*)$ http://gibbon/$1 [P,L]

    # Route to Odoo
    RewriteCond %{HTTP:X-Chameleon-Target} ^odoo$ [NC]
    RewriteRule ^/?(.*)$ http://odoo:8069/$1 [P,L]

    # The Ultimate Safety Fallback (Never hit localhost)
    RewriteRule ^/?(.*)$ http://wordpress/$1 [P,L]
</VirtualHost>