# --- CHAMELEON-REN Robust ModSecurity Config ---

# 0. Core Engine Mode (WP2 Task 2.3)
SecRuleEngine DetectionOnly

# ==========================================
# 1. PAYLOAD CAPTURE & LIMITS (AWS ROBUSTNESS)
# ==========================================
# We MUST explicitly tell the WAF to look at the POST body
SecRequestBodyAccess On
SecResponseBodyAccess On

# Increase limits to 15MB so the honeypot can swallow large web-shells and malicious PDFs
SecRequestBodyLimit 15728640
SecRequestBodyNoFilesLimit 15728640
SecRequestBodyInMemoryLimit 15728640

# ==========================================
# 2. THE PERSISTENCE FIX (WP2 Task 2.2)
# ==========================================
# Ensure IP tracking and anomaly scores survive container restarts
SecDataDir /var/log/modsecurity-data

# ==========================================
# 3. CAPTURE-FIRST TELEMETRY
# ==========================================
# Added 'C' to ensure the malicious POST payload is written to the JSON!
SecAuditLogParts ABCIJDEFHZ
SecAuditLogFormat JSON
SecAuditLogType Serial
SecAuditLog /var/log/chameleon/modsec_audit.log